name: Cluster Access Bot

on:
  issue_comment:
    types: [created]

jobs:
  share-cluster:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract cluster ID
        id: extract
        run: |
          COMMENT="${{ github.event.comment.body }}"

          if [[ "$COMMENT" =~ cluster-bot[[:space:]]+([0-9]+) ]]; then
            echo "cluster_id=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "cluster_id=none" >> $GITHUB_OUTPUT
          fi

      - name: Get Box link from JSON
        id: link
        if: steps.extract.outputs.cluster_id != 'none'
        run: |
          CLUSTER_ID=${{ steps.extract.outputs.cluster_id }}

          LINK=$(jq -r --arg id "$CLUSTER_ID" '.[$id]' clusters.json)

          if [ "$LINK" = "null" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "found=true" >> $GITHUB_OUTPUT
            echo "link=$LINK" >> $GITHUB_OUTPUT
          fi

      - name: Reply in Issue
        if: steps.link.outputs.found == 'true'
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
          -d "{\"body\":\"Cluster ${{ steps.extract.outputs.cluster_id }} details: ${{ steps.link.outputs.link }}\"}"
