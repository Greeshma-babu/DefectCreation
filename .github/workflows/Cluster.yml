name: Cluster Access Bot (AI Enabled)

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  share-cluster:
    runs-on: ubuntu-latest

    steps:
      # Step 0: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 1: Detect cluster request using Hugging Face NLP
      - name: Detect cluster request using Hugging Face
        id: ai
        run: |
          COMMENT="${{ github.event.comment.body }}"
          echo "Comment: $COMMENT"

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://api-inference.huggingface.co/models/facebook/bart-large-mnli \
            -d "{
              \"inputs\": \"$COMMENT\",
              \"parameters\": {
                \"candidate_labels\": [\"request cluster access\", \"not related\"]
              }
            }")

          SCORE=$(echo "$RESPONSE" | jq '.scores[0]')

          if (( $(echo "$SCORE > 0.7" | bc -l) )); then
            echo "intent=true" >> $GITHUB_OUTPUT
          else
            echo "intent=false" >> $GITHUB_OUTPUT
          fi

      # Step 2: Stop if not a cluster request
      - name: Stop if not cluster request
        if: steps.ai.outputs.intent == 'false'
        run: |
          echo "Not a cluster access request."
          exit 0

      # Step 3: Extract cluster ID
      - name: Extract cluster ID
        id: extract
        run: |
          COMMENT="${{ github.event.comment.body }}"

          if [[ "$COMMENT" =~ ([0-9]{3,6}) ]]; then
            echo "cluster_id=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "cluster_id=none" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no cluster ID found
        if: steps.extract.outputs.cluster_id == 'none'
        run: exit 0

      # Step 4: Get cluster link from clusters.json
      - name: Get cluster link
        id: fetch
        run: |
          CLUSTER_ID=${{ steps.extract.outputs.cluster_id }}
          LINK=$(jq -r --arg id "$CLUSTER_ID" '.[$id]' clusters.json)

          if [ "$LINK" = "null" ] || [ -z "$LINK" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "found=true" >> $GITHUB_OUTPUT
            echo "link=$LINK" >> $GITHUB_OUTPUT
          fi

      # Step 5: Grant Box access dynamically using shared link
      - name: Grant Box access
        if: steps.fetch.outputs.found == 'true'
        run: |
          LINK="${{ steps.fetch.outputs.link }}"
          USERNAME="${{ github.event.comment.user.login }}"
          BOX_EMAIL=$(jq -r --arg USER "$USERNAME" '.[$USER]' emails.json)

          if [ -z "$BOX_EMAIL" ] || [ "$BOX_EMAIL" = "null" ]; then
            echo "No Box email found for user $USERNAME"
            exit 1
          fi

          # Get folder/file ID from Box shared link
          FOLDER_ID=$(curl -s -H "Authorization: Bearer ${{ secrets.BOX_TOKEN }}" \
            "https://api.box.com/2.0/shared_items?shared_link=$LINK" | jq -r '.id')

          if [ -z "$FOLDER_ID" ] || [ "$FOLDER_ID" = "null" ]; then
            echo "Unable to retrieve folder ID from Box shared link"
            exit 1
          fi

          # Grant access
          curl -s -X POST https://api.box.com/2.0/collaborations \
            -H "Authorization: Bearer ${{ secrets.BOX_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
                  \"item\": {\"id\": \"$FOLDER_ID\", \"type\": \"folder\"},
                  \"accessible_by\": {\"login\": \"$BOX_EMAIL\", \"type\": \"user\"},
                  \"role\": \"editor\"
                }"

      # Step 6: Reply in GitHub with cluster link
      - name: Reply with cluster link
        if: steps.fetch.outputs.found == 'true'
        run: |
          USER="${{ github.event.comment.user.login }}"
          COMMENT_BODY="${{ github.event.comment.body }}"
          LINK="${{ steps.fetch.outputs.link }}"

          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -d "{
              \"body\": \"@${USER}\n\n> ${COMMENT_BODY}\n\nHere is the cluster ${{ steps.extract.outputs.cluster_id }} link:\n$LINK\n\n✅ Access granted on Box Note.\"
            }"

      # Step 7: Reply if cluster not available
      - name: Reply cluster not available
        if: steps.fetch.outputs.found == 'false'
        run: |
          USER="${{ github.event.comment.user.login }}"
          COMMENT_BODY="${{ github.event.comment.body }}"

          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -d "{
              \"body\": \"@${USER}\n\n> ${COMMENT_BODY}\n\n❌ Cluster not available.\"
            }"
